# ============================================================
# 每日新闻 · RSS 订阅源配置
# ------------------------------------------------------------
# 每个一级键是一个「分类」（子文件夹名，需与 build_archive.py
# 中 CATEGORY_LABELS 的键一致）。目前启用的三个分类：
#   tech    科技
#   finance 财经
#   world   国际
# （sports / health / culture 已在归档系统预置，按需在此添加即可）
#
# 每个分类下是订阅源列表，每项含：
#   name:        来源显示名（会作为卡片上的来源 chip）
#   url:         RSS 2.0 或 Atom 订阅地址
#   weight:      来源权威度权重（可选，默认1.0，范围0.0-3.0）
#   engagement:  互动数据来源类型（可选，默认none；支持hn=Hacker News API）
#   max_articles: 单源最大抓取条目数（可选，默认不限）
#
# 维护说明：
#   - 加源 = 在对应分类下追加 "- name / url" 两项；
#   - 删源 = 删掉对应两行；
#   - 加新分类 = 新增一个一级键，并确保 build_archive.py 的
#     CATEGORY_LABELS / CAT_COLORS / CAT_ICONS 里也有对应条目
#     （tech/finance/world 已内置）。
#   - 抓取失败的单个源会被自动跳过并告警，不影响其他源与分类。
#
# ============================================================
# 热度排名系统配置（_ranking）
# ------------------------------------------------------------
# 完全可选：不配置此节则行为与之前完全一致（按时间排序 + top 20）。
# 配置后，构建时根据多因子评分自动筛选高热度新闻。
#
# 评分因子及权重（各因子归一化到[0,1]，加权求和后×100得到0-100分）：
#   engagement:      互动数据（HN score+comments，对数归一化）
#   recency:         时效性（指数衰减，半衰期可配）
#   authority:       信源权威（源weight在同分类内min-max归一化）
#   informativeness: 标题信息量（长度+数字密度+专有名词）
#   cross_source:    跨源报道加成（Jaccard关键词相似度）
#
# 排名方法（method）：
#   top_n:      按分数降序保留前N条（top_n参数）
#   percentile: 按分数降序保留前X%（percentile参数，如60表示前60%）
#   threshold:  只保留分数≥阈值的条目（threshold参数，0-100范围）
#
# 权重总和会自动归一化为1.0，无需手动校准。
# ============================================================

_ranking:
  defaults:
    method: top_n
    top_n: 20
    weights:
      engagement: 0.35
      recency: 0.25
      authority: 0.20
      informativeness: 0.10
      cross_source: 0.10
    recency_half_life: 6.0
    engagement_poll_timeout: 15

  tech:
    method: top_n
    top_n: 20
    weights:
      engagement: 0.30
      recency: 0.30
      authority: 0.15
      informativeness: 0.10
      cross_source: 0.15
    recency_half_life: 4.0

  finance:
    method: top_n
    top_n: 15
    weights:
      engagement: 0.10
      recency: 0.40
      authority: 0.25
      informativeness: 0.15
      cross_source: 0.10

  world:
    method: top_n
    top_n: 20
    weights:
      engagement: 0.0
      recency: 0.40
      authority: 0.25
      informativeness: 0.15
      cross_source: 0.20

