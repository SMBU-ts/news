name: Deploy GitHub Pages

# 每次向 main / master 分支推送都会自动构建并部署到 GitHub Pages。
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# 赋予 Pages 部署所需的最小权限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，避免并发覆盖。
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 站点根目录即仓库根目录。
          path: "."
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
